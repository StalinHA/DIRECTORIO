<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Contactos Profesional - Sistema de Gestión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #131820;
            --bg-tertiary: #1a1f2e;
            --bg-card: #1e2433;
            --bg-card-hover: #252b3d;
            --border-color: #2a3040;
            --border-glow: #3a4060;
            --text-primary: #e4e8f0;
            --text-secondary: #a0a8b8;
            --text-muted: #6b7280;
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --warning: #f59e0b;
            --whatsapp: #25D366;
            --whatsapp-glow: rgba(37, 211, 102, 0.3);
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            --gradient-dark: linear-gradient(135deg, #0a0e14 0%, #131820 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px var(--accent-glow);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg), 0 0 60px rgba(99, 102, 241, 0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
        }

        .header {
            background: var(--gradient-dark);
            border-bottom: 1px solid var(--border-color);
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gradient-1);
            opacity: 0.5;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-1);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #e4e8f0 0%, #a0a8b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 50px;
            border: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .user-details {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .user-role {
            font-size: 11px;
            color: var(--accent-secondary);
            font-weight: 500;
        }

        .main-content {
            display: flex;
            min-height: 650px;
        }

        .sidebar {
            width: 320px;
            background: var(--bg-tertiary);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            font-size: 11px;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .group-list {
            list-style: none;
            margin-bottom: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .group-list::-webkit-scrollbar {
            width: 4px;
        }

        .group-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .group-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .group-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            position: relative;
            border: 1px solid transparent;
        }

        .group-item:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-color);
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .group-item.active {
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 500;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .group-item.active::before {
            content: '';
            position: absolute;
            left: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--gradient-1);
            border-radius: 2px;
        }

        .group-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .group-item.active .group-icon {
            opacity: 1;
            color: var(--accent-secondary);
        }

        .group-count {
            margin-left: auto;
            background: var(--bg-primary);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .add-group-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px dashed var(--border-color);
            color: var(--text-muted);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
        }

        .add-group-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-secondary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .content-area {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .content-header h2 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #e4e8f0 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
            box-shadow: 0 4px 15px var(--whatsapp-glow);
        }

        .btn-whatsapp:hover {
            background: #20bd5a;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--whatsapp-glow);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 15px var(--danger-glow);
        }

        .btn-export {
            background: transparent;
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        .btn-export:hover {
            background: var(--warning);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .search-container {
            position: relative;
            margin-bottom: 24px;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
            background: var(--bg-card);
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .contact-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .contact-card.deleted {
            opacity: 0.7;
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .contact-card.deleted::before {
            background: var(--danger);
            opacity: 1;
        }

        .contact-card:hover {
            border-color: var(--border-glow);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 30px rgba(99, 102, 241, 0.05);
            transform: translateY(-4px);
            background: var(--bg-card-hover);
        }

        .contact-card:hover::before {
            opacity: 1;
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .contact-main-info {
            flex: 1;
            margin-left: 16px;
        }

        .contact-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .contact-position {
            font-size: 12px;
            color: var(--accent-secondary);
            font-weight: 500;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-entity {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .contact-details {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .contact-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-info svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .contact-emails {
            margin-top: 8px;
            padding-left: 26px;
        }

        .email-item {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .contact-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 600px;
            max-width: 95%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content.wide {
            width: 800px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #e4e8f0 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
            background: var(--bg-card);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .email-list {
            margin-top: 8px;
        }

        .email-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .email-input-group input {
            flex: 1;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .history-section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .history-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            font-size: 12px;
            color: var(--text-muted);
            padding: 12px 0;
            border-bottom: 1px solid rgba(42, 48, 64, 0.5);
            display: flex;
            align-items: start;
            gap: 12px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .history-dot.creacion {
            background: var(--success);
            box-shadow: 0 0 10px var(--success-glow);
        }

        .history-dot.edicion {
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .history-dot.eliminacion {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger-glow);
        }

        .history-changes {
            margin-top: 6px;
            padding: 8px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .change-item {
            font-size: 11px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .change-old {
            color: var(--danger);
            text-decoration: line-through;
        }

        .change-new {
            color: var(--success);
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 16px 24px;
            border-radius: var(--radius-md);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
            border: 1px solid var(--border-color);
            font-size: 14px;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            border-left: 3px solid var(--success);
        }

        .toast.error {
            border-left: 3px solid var(--danger);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-secondary);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .whatsapp-modal-body {
            padding: 20px 0;
        }

        .template-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .template-btn {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
        }

        .template-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .char-count {
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        @media (max-width: 1024px) {
            .contacts-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            
            .contacts-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // ============================================
        // CONFIGURACIÓN CENTRALIZADA
        // ============================================
        const CONFIG = {
            timezone: 'America/Lima',
            locale: 'es-PE',
            dateFormat: 'DD/MM/YYYY HH:mm:ss',
            timeFormat: 'HH:mm:ss',
            version: '2.0.0'
        };

        // ============================================
        // SISTEMA DE GESTIÓN DE DIRECTORIO
        // ============================================
        class DirectoryManager {
            constructor() {
                this.groups = JSON.parse(localStorage.getItem('futuristicDirectoryGroups')) || [];
                this.contacts = JSON.parse(localStorage.getItem('futuristicDirectoryContacts')) || [];
                this.history = JSON.parse(localStorage.getItem('futuristicDirectoryHistory')) || [];
                this.currentGroup = null;
                this.showDeleted = false;
                
                if (this.groups.length === 0) {
                    this.initializeDefaultGroups();
                }
            }

            initializeDefaultGroups() {
                const defaultGroups = [
                    { id: this.generateId(), name: 'Proveedores', icon: 'truck', type: 'predefinido', color: '#3B82F6' },
                    { id: this.generateId(), name: 'Entidades Públicas', icon: 'building', type: 'predefinido', color: '#10B981' },
                    { id: this.generateId(), name: 'Entidades Privadas', icon: 'briefcase', type: 'predefinido', color: '#8B5CF6' }
                ];
                this.groups = defaultGroups;
                this.saveGroups();
            }

            generateId() {
                return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
            }

            getPeruDateTime() {
                const now = new Date();
                return now.toLocaleString('es-PE', {
                    timeZone: 'America/Lima',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            }

            getPeruTimestamp() {
                return new Date().toLocaleString('es-PE', {
                    timeZone: 'America/Lima',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            }

            // Gestión de Grupos
            addGroup(name, color = '#6366f1') {
                const group = {
                    id: this.generateId(),
                    name: name,
                    icon: 'folder',
                    type: 'personalizado',
                    color: color,
                    createdAt: this.getPeruDateTime(),
                    createdBy: 'Administrador'
                };
                this.groups.push(group);
                this.saveGroups();
                this.addHistory('grupo', group.id, 'CREACIÓN', 'Administrador', 
                    `Grupo "${name}" creado exitosamente`, null);
                return group;
            }

            deleteGroup(groupId) {
                const group = this.groups.find(g => g.id === groupId);
                if (!group || group.type === 'predefinido') return false;
                
                this.addHistory('grupo', groupId, 'ELIMINACIÓN', 'Administrador', 
                    `Grupo "${group.name}" eliminado permanentemente`, null);
                
                this.contacts = this.contacts.filter(c => c.groupId !== groupId);
                this.groups = this.groups.filter(g => g.id !== groupId);
                this.saveGroups();
                this.saveContacts();
                return true;
            }

            // Gestión de Contactos
            addContact(contactData) {
                const contact = {
                    id: this.generateId(),
                    groupId: contactData.groupId || null,
                    name: contactData.name,
                    lastName: contactData.lastName || '',
                    position: contactData.position || '',
                    entity: contactData.entity || '',
                    phone: contactData.phone,
                    emails: contactData.emails || [],
                    comment: contactData.comment || '',
                    estado: 'activo',
                    createdAt: this.getPeruDateTime(),
                    updatedAt: this.getPeruDateTime(),
                    createdBy: 'Administrador',
                    updatedBy: 'Administrador'
                };
                this.contacts.push(contact);
                this.saveContacts();
                this.addHistory('contacto', contact.id, 'CREACIÓN', 'Administrador', 
                    `Contacto "${contact.name} ${contact.lastName}" registrado en el sistema`,
                    { datos_iniciales: { ...contact } });
                return contact;
            }

            updateContact(contactId, updatedData) {
                const index = this.contacts.findIndex(c => c.id === contactId);
                if (index === -1) return null;
                
                const oldContact = {...this.contacts[index]};
                const changes = {};
                
                Object.keys(updatedData).forEach(key => {
                    if (JSON.stringify(updatedData[key]) !== JSON.stringify(oldContact[key])) {
                        changes[key] = {
                            anterior: oldContact[key],
                            nuevo: updatedData[key]
                        };
                    }
                });
                
                if (Object.keys(changes).length === 0) return oldContact;
                
                this.contacts[index] = {
                    ...this.contacts[index],
                    ...updatedData,
                    updatedAt: this.getPeruDateTime(),
                    updatedBy: 'Administrador'
                };
                
                this.saveContacts();
                this.addHistory('contacto', contactId, 'EDICIÓN', 'Administrador', 
                    `Se modificaron ${Object.keys(changes).length} campo(s)`,
                    { cambios: changes });
                
                return this.contacts[index];
            }

            softDeleteContact(contactId) {
                const contact = this.contacts.find(c => c.id === contactId);
                if (!contact) return false;
                
                contact.estado = 'eliminado';
                contact.updatedAt = this.getPeruDateTime();
                contact.updatedBy = 'Administrador';
                this.saveContacts();
                
                this.addHistory('contacto', contactId, 'ELIMINACIÓN', 'Administrador', 
                    `Contacto "${contact.name} ${contact.lastName}" marcado como eliminado (soft delete)`,
                    { estado_anterior: 'activo', estado_nuevo: 'eliminado' });
                
                return true;
            }

            restoreContact(contactId) {
                const contact = this.contacts.find(c => c.id === contactId);
                if (!contact || contact.estado !== 'eliminado') return false;
                
                contact.estado = 'activo';
                contact.updatedAt = this.getPeruDateTime();
                contact.updatedBy = 'Administrador';
                this.saveContacts();
                
                this.addHistory('contacto', contactId, 'RESTAURACIÓN', 'Administrador', 
                    `Contacto "${contact.name} ${contact.lastName}" restaurado`,
                    { estado_anterior: 'eliminado', estado_nuevo: 'activo' });
                
                return true;
            }

            getContactsByGroup(groupId) {
                let contacts = groupId ? this.contacts.filter(c => c.groupId === groupId) : this.contacts;
                if (!this.showDeleted) {
                    contacts = contacts.filter(c => c.estado !== 'eliminado');
                }
                return contacts;
            }

            getContactCountByGroup(groupId) {
                return this.contacts.filter(c => c.groupId === groupId && c.estado === 'activo').length;
            }

            getStats() {
                const active = this.contacts.filter(c => c.estado === 'activo').length;
                const deleted = this.contacts.filter(c => c.estado === 'eliminado').length;
                return {
                    total: this.contacts.length,
                    activos: active,
                    eliminados: deleted,
                    grupos: this.groups.length,
                    historial: this.history.length
                };
            }

            // Historial Inmutable
            addHistory(type, entityId, action, user, description, details) {
                const historyEntry = {
                    id: this.generateId(),
                    type: type,
                    entityId: entityId,
                    action: action,
                    user: user,
                    description: description,
                    details: details || {},
                    timestamp: this.getPeruTimestamp(),
                    permanente: true,
                    ip: '127.0.0.1'
                };
                this.history.push(historyEntry);
                this.saveHistory();
            }

            getHistoryForEntity(entityId) {
                return this.history
                    .filter(h => h.entityId === entityId)
                    .sort((a, b) => {
                        return new Date(b.timestamp.split(' ')[0].split('/').reverse().join('-') + 'T' + b.timestamp.split(' ')[1]) -
                               new Date(a.timestamp.split(' ')[0].split('/').reverse().join('-') + 'T' + a.timestamp.split(' ')[1]);
                    });
            }

            getAllHistory() {
                return this.history.sort((a, b) => {
                    return new Date(b.timestamp.split(' ')[0].split('/').reverse().join('-') + 'T' + b.timestamp.split(' ')[1]) -
                           new Date(a.timestamp.split(' ')[0].split('/').reverse().join('-') + 'T' + a.timestamp.split(' ')[1]);
                });
            }

            exportHistory() {
                const history = this.getAllHistory();
                const exportData = history.map(h => ({
                    'Fecha (Lima, Perú)': h.timestamp,
                    'Tipo': h.type,
                    'Acción': h.action,
                    'Usuario': h.user,
                    'Descripción': h.description,
                    'IP': h.ip
                }));
                return exportData;
            }

            // Persistencia
            saveGroups() {
                localStorage.setItem('futuristicDirectoryGroups', JSON.stringify(this.groups));
            }

            saveContacts() {
                localStorage.setItem('futuristicDirectoryContacts', JSON.stringify(this.contacts));
            }

            saveHistory() {
                localStorage.setItem('futuristicDirectoryHistory', JSON.stringify(this.history));
            }
        }

        const directory = new DirectoryManager();

        // ============================================
        // ICONOS SVG
        // ============================================
        const icons = {
            truck: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>`,
            building: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="1"></rect><line x1="9" y1="6" x2="9" y2="6.01"></line><line x1="15" y1="6" x2="15" y2="6.01"></line><line x1="9" y1="10" x2="9" y2="10.01"></line><line x1="15" y1="10" x2="15" y2="10.01"></line><line x1="9" y1="14" x2="9" y2="14.01"></line><line x1="15" y1="14" x2="15" y2="14.01"></line><path d="M9 18h6v4H9z"></path></svg>`,
            briefcase: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>`,
            folder: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>`,
            users: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`
        };

        // ============================================
        // FUNCIONES DE UI
        // ============================================
        let currentWhatsAppContact = null;

        function renderGroups() {
            const groupList = document.getElementById('groupList');
            groupList.innerHTML = '';
            
            const allItem = document.createElement('li');
            allItem.className = `group-item ${directory.currentGroup === null ? 'active' : ''}`;
            allItem.innerHTML = `
                <span class="group-icon">${icons.users}</span>
                <span>Todos los Contactos</span>
                <span class="group-count">${directory.getStats().activos}</span>
            `;
            allItem.onclick = () => selectGroup(null);
            groupList.appendChild(allItem);
            
            directory.groups.forEach(group => {
                const item = document.createElement('li');
                item.className = `group-item ${directory.currentGroup === group.id ? 'active' : ''}`;
                item.style.borderLeft = `3px solid ${group.color || '#6366f1'}`;
                item.innerHTML = `
                    <span class="group-icon">${icons[group.icon] || icons.folder}</span>
                    <span>${group.name}</span>
                    <span class="group-count">${directory.getContactCountByGroup(group.id)}</span>
                `;
                item.onclick = () => selectGroup(group.id);
                
                if (group.type === 'personalizado') {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'btn btn-sm btn-danger';
                    deleteBtn.style.cssText = 'margin-left: 8px; padding: 2px 6px; font-size: 10px;';
                    deleteBtn.innerHTML = `
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    `;
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm(`¿Eliminar permanentemente el grupo "${group.name}"?\n\nLos contactos de este grupo también serán eliminados.\nEsta acción quedará registrada en el historial inmutable.`)) {
                            const deleted = directory.deleteGroup(group.id);
                            if (deleted) {
                                if (directory.currentGroup === group.id) {
                                    directory.currentGroup = null;
                                }
                                renderGroups();
                                renderContacts();
                                renderStats();
                                showToast('Grupo eliminado correctamente', 'success');
                            }
                        }
                    };
                    item.appendChild(deleteBtn);
                }
                
                groupList.appendChild(item);
            });
        }

        function selectGroup(groupId) {
            directory.currentGroup = groupId;
            renderGroups();
            renderContacts();
            renderStats();
            
            const group = directory.groups.find(g => g.id === groupId);
            document.getElementById('currentGroupTitle').textContent = group ? group.name : 'Todos los Contactos';
        }

        function renderStats() {
            const stats = directory.getStats();
            const contacts = directory.getContactsByGroup(directory.currentGroup);
            
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${contacts.length}</div>
                    <div class="stat-label">Contactos Visibles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.activos}</div>
                    <div class="stat-label">Activos Totales</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.grupos}</div>
                    <div class="stat-label">Grupos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.historial}</div>
                    <div class="stat-label">Eventos Registrados</div>
                </div>
            `;
        }

        function renderContacts(filter = '') {
            const contactsGrid = document.getElementById('contactsGrid');
            const contacts = directory.getContactsByGroup(directory.currentGroup);
            
            const filteredContacts = contacts.filter(contact => {
                const searchTerm = filter.toLowerCase();
                return contact.name.toLowerCase().includes(searchTerm) ||
                       (contact.lastName && contact.lastName.toLowerCase().includes(searchTerm)) ||
                       contact.position.toLowerCase().includes(searchTerm) ||
                       contact.entity.toLowerCase().includes(searchTerm) ||
                       contact.phone.includes(searchTerm) ||
                       (contact.emails && contact.emails.some(e => e.toLowerCase().includes(searchTerm))) ||
                       (contact.comment && contact.comment.toLowerCase().includes(searchTerm));
            });
            
            if (filteredContacts.length === 0) {
                contactsGrid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <h3>No se encontraron contactos</h3>
                        <p style="margin-top: 8px;">Crea un nuevo contacto para comenzar</p>
                    </div>
                `;
                return;
            }
            
            contactsGrid.innerHTML = filteredContacts.map(contact => {
                const initials = (contact.name.charAt(0) + (contact.lastName ? contact.lastName.charAt(0) : '')).toUpperCase();
                const isDeleted = contact.estado === 'eliminado';
                
                return `
                    <div class="contact-card ${isDeleted ? 'deleted' : ''}">
                        <div class="contact-header">
                            <div class="contact-avatar" style="${isDeleted ? 'background: #ef4444;' : ''}">${initials}</div>
                            <div class="contact-main-info">
                                <div class="contact-name">
                                    ${contact.name} ${contact.lastName || ''}
                                    ${isDeleted ? '<span class="badge badge-danger" style="margin-left: 8px;">Eliminado</span>' : ''}
                                </div>
                                <div class="contact-position">${contact.position || 'Sin cargo'}</div>
                                <div class="contact-entity">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                                    </svg>
                                    ${contact.entity || 'Sin entidad'}
                                </div>
                            </div>
                        </div>
                        <div class="contact-details">
                            <div class="contact-info">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                                ${contact.phone}
                            </div>
                            ${contact.emails && contact.emails.length > 0 ? `
                            <div class="contact-emails">
                                ${contact.emails.map(email => `
                                    <div class="email-item">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                            <polyline points="22,6 12,13 2,6"></polyline>
                                        </svg>
                                        ${email}
                                    </div>
                                `).join('')}
                            </div>
                            ` : ''}
                            ${contact.comment ? `
                            <div class="contact-info">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                </svg>
                                ${contact.comment}
                            </div>
                            ` : ''}
                        </div>
                        <div class="contact-date">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            ${contact.createdAt} (Lima, Perú)
                        </div>
                        <div class="contact-actions">
                            ${!isDeleted ? `
                            <button class="btn btn-sm btn-whatsapp" onclick="openWhatsAppModal('${contact.id}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
                                </svg>
                                WhatsApp
                            </button>
                            <button class="btn btn-sm btn-outline" onclick="editContact('${contact.id}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                                Editar
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteContact('${contact.id}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                                Eliminar
                            </button>
                            ` : `
                            <button class="btn btn-sm btn-outline" onclick="restoreContact('${contact.id}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                                </svg>
                                Restaurar
                            </button>
                            `}
                            <button class="btn btn-sm btn-outline" onclick="viewHistory('${contact.id}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                Historial
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterContacts() {
            const searchTerm = document.getElementById('searchInput').value;
            renderContacts(searchTerm);
        }

        function toggleDeletedContacts() {
            directory.showDeleted = !directory.showDeleted;
            document.getElementById('showDeletedText').textContent = 
                directory.showDeleted ? 'Ocultar Eliminados' : 'Mostrar Eliminados';
            renderContacts();
            renderStats();
        }

        // ============================================
        // FUNCIONES DE WHATSAPP
        // ============================================
        function openWhatsAppModal(contactId) {
            const contact = directory.contacts.find(c => c.id === contactId);
            if (!contact) return;
            
            currentWhatsAppContact = contact;
            document.getElementById('whatsappRecipient').textContent = 
                `${contact.name} ${contact.lastName}`;
            document.getElementById('whatsappNumber').textContent = contact.phone;
            document.getElementById('whatsappMessage').value = '';
            updateCharCount();
            openModal('whatsappModal');
        }

        function setTemplate(type) {
            const contact = currentWhatsAppContact;
            if (!contact) return;
            
            const templates = {
                saludo: `Estimado/a ${contact.name} ${contact.lastName},\n\nEspero que este mensaje le encuentre bien. Le escribo desde ${contact.entity || 'nuestra organización'} para saludarle cordialmente.\n\nQuedo atento/a a su respuesta.\n\nSaludos cordiales.`,
                cotizacion: `Estimado/a ${contact.name},\n\nLe escribo para solicitar una cotización de sus servicios/productos.\n\nAgradeceré me pueda enviar la información a la brevedad posible.\n\nMuchas gracias.`,
                seguimiento: `Estimado/a ${contact.name},\n\nLe escribo para dar seguimiento a nuestra comunicación anterior.\n\nQuedo atento/a a sus comentarios.\n\nSaludos.`,
                personalizado: `Estimado/a ${contact.name},\n\n`
            };
            
            document.getElementById('whatsappMessage').value = templates[type] || '';
            updateCharCount();
        }

        function updateCharCount() {
            const message = document.getElementById('whatsappMessage').value;
            document.getElementById('charCount').textContent = message.length;
        }

        function sendWhatsAppMessage() {
            if (!currentWhatsAppContact) return;
            
            const message = document.getElementById('whatsappMessage').value.trim();
            if (!message) {
                showToast('Por favor escriba un mensaje', 'error');
                return;
            }
            
            const cleanPhone = currentWhatsAppContact.phone.replace(/[^0-9]/g, '');
            const whatsappUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`;
            
            directory.addHistory('contacto', currentWhatsAppContact.id, 'MENSAJE', 'Administrador', 
                `Mensaje de WhatsApp enviado a ${cleanPhone}`,
                { mensaje: message.substring(0, 100) + '...' });
            
            window.open(whatsappUrl, '_blank');
            closeModal('whatsappModal');
            showToast('Abriendo WhatsApp...', 'success');
        }

        // ============================================
        // FUNCIONES DE CONTACTOS
        // ============================================
        function showAddContactModal() {
            document.getElementById('modalTitle').textContent = 'Nuevo Contacto';
            document.getElementById('contactForm').reset();
            document.getElementById('contactId').value = '';
            document.getElementById('contactGroupId').value = directory.currentGroup || '';
            document.getElementById('contactDateInfo').innerHTML = '';
            document.getElementById('historySection').style.display = 'none';
            
            // Reset emails
            document.getElementById('emailList').innerHTML = `
                <div class="email-input-group">
                    <input type="email" class="contact-email" placeholder="correo@ejemplo.com">
                    <button type="button" class="btn btn-sm btn-outline" onclick="removeEmailField(this)" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            `;
            
            populateGroupSelect();
            openModal('contactModal');
        }

        function editContact(contactId) {
            const contact = directory.contacts.find(c => c.id === contactId);
            if (!contact) return;
            
            document.getElementById('modalTitle').textContent = 'Editar Contacto';
            document.getElementById('contactId').value = contact.id;
            document.getElementById('contactName').value = contact.name;
            document.getElementById('contactLastName').value = contact.lastName || '';
            document.getElementById('contactPosition').value = contact.position || '';
            document.getElementById('contactEntity').value = contact.entity || '';
            document.getElementById('contactPhone').value = contact.phone;
            document.getElementById('contactComment').value = contact.comment || '';
            
            document.getElementById('contactDateInfo').innerHTML = `
                <div style="padding: 12px; background: rgba(99, 102, 241, 0.05); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div>Creado: ${contact.createdAt} (Lima, Perú)</div>
                    ${contact.updatedAt !== contact.createdAt ? `<div>Última edición: ${contact.updatedAt}</div>` : ''}
                    <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">*Fecha generada automáticamente - No editable</div>
                </div>
            `;
            
            // Populate emails
            const emailList = document.getElementById('emailList');
            emailList.innerHTML = '';
            if (contact.emails && contact.emails.length > 0) {
                contact.emails.forEach((email, index) => {
                    const div = document.createElement('div');
                    div.className = 'email-input-group';
                    div.innerHTML = `
                        <input type="email" class="contact-email" value="${email}" placeholder="correo@ejemplo.com">
                        <button type="button" class="btn btn-sm btn-outline" onclick="removeEmailField(this)" ${index === 0 ? 'style="display:none;"' : ''}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    `;
                    emailList.appendChild(div);
                });
            } else {
                emailList.innerHTML = `
                    <div class="email-input-group">
                        <input type="email" class="contact-email" placeholder="correo@ejemplo.com">
                        <button type="button" class="btn btn-sm btn-outline" onclick="removeEmailField(this)" style="display:none;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                `;
            }
            
            // Show history
            const history = directory.getHistoryForEntity(contactId);
            const historyList = document.getElementById('historyList');
            if (history.length > 0) {
                document.getElementById('historySection').style.display = 'block';
                historyList.innerHTML = history.map(h => `
                    <div class="history-item">
                        <div class="history-dot ${h.action.toLowerCase()}"></div>
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                <strong style="color: var(--text-secondary);">${h.action}</strong>
                                <span style="font-size: 10px; color: var(--text-muted);">${h.timestamp}</span>
                            </div>
                            <div style="font-size: 11px; color: var(--text-muted);">${h.description}</div>
                            ${h.details && h.details.cambios ? `
                                <div class="history-changes">
                                    ${Object.keys(h.details.cambios).map(field => `
                                        <div class="change-item">
                                            <strong>${field}:</strong>
                                            <span class="change-old">${JSON.stringify(h.details.cambios[field].anterior)}</span>
                                            →
                                            <span class="change-new">${JSON.stringify(h.details.cambios[field].nuevo)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                            <div style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">
                                Usuario: ${h.user} | IP: ${h.ip || '127.0.0.1'}
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('historySection').style.display = 'none';
            }
            
            populateGroupSelect(contact.groupId);
            openModal('contactModal');
        }

        function deleteContact(contactId) {
            if (confirm('¿Está seguro de eliminar este contacto?\n\nSe aplicará un soft delete (eliminación lógica).\nEsta acción quedará registrada permanentemente en el historial inmutable.')) {
                const deleted = directory.softDeleteContact(contactId);
                if (deleted) {
                    renderContacts();
                    renderStats();
                    showToast('Contacto eliminado correctamente (soft delete)', 'success');
                }
            }
        }

        function restoreContact(contactId) {
            if (confirm('¿Restaurar este contacto?')) {
                const restored = directory.restoreContact(contactId);
                if (restored) {
                    renderContacts();
                    renderStats();
                    showToast('Contacto restaurado correctamente', 'success');
                }
            }
        }

        function viewHistory(contactId) {
            editContact(contactId);
            setTimeout(() => {
                document.getElementById('historySection').scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }

        function addEmailField() {
            const emailList = document.getElementById('emailList');
            const div = document.createElement('div');
            div.className = 'email-input-group';
            div.innerHTML = `
                <input type="email" class="contact-email" placeholder="correo@ejemplo.com">
                <button type="button" class="btn btn-sm btn-outline" onclick="removeEmailField(this)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            `;
            emailList.appendChild(div);
        }

        function removeEmailField(btn) {
            const emailList = document.getElementById('emailList');
            if (emailList.children.length > 1) {
                btn.closest('.email-input-group').remove();
            }
        }

        function populateGroupSelect(selectedGroupId = null) {
            const select = document.getElementById('contactGroup');
            select.innerHTML = '<option value="">Seleccionar grupo...</option>';
            
            directory.groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group.id;
                option.textContent = group.name;
                if (group.id === selectedGroupId || group.id === directory.currentGroup) {
                    option.selected = true;
                }
                select.appendChild(option);
            });
        }

        // ============================================
        // FUNCIONES DE GRUPOS
        // ============================================
        function showAddGroupModal() {
            document.getElementById('groupForm').reset();
            openModal('groupModal');
        }

        // ============================================
        // FUNCIONES DE HISTORIAL
        // ============================================
        function exportHistory() {
            const data = directory.exportHistory();
            if (data.length === 0) {
                showToast('No hay eventos en el historial para exportar', 'error');
                return;
            }
            
            let csv = 'Fecha (Lima, Perú),Tipo,Acción,Usuario,Descripción,IP\n';
            data.forEach(row => {
                csv += `"${row['Fecha (Lima, Perú)']}","${row['Tipo']}","${row['Acción']}","${row['Usuario']}","${row['Descripción']}","${row['IP']}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `historial_directorio_${directory.getPeruDateTime().replace(/[/:]/g, '_')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('Historial exportado correctamente', 'success');
        }

        // ============================================
        // FUNCIONES DE MODAL
        // ============================================
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const contactId = document.getElementById('contactId').value;
            const emails = Array.from(document.querySelectorAll('.contact-email'))
                .map(input => input.value.trim())
                .filter(email => email !== '');
            
            const contactData = {
                groupId: document.getElementById('contactGroup').value || null,
                name: document.getElementById('contactName').value.trim(),
                lastName: document.getElementById('contactLastName').value.trim(),
                position: document.getElementById('contactPosition').value.trim(),
                entity: document.getElementById('contactEntity').value.trim(),
                phone: document.getElementById('contactPhone').value.trim(),
                emails: emails,
                comment: document.getElementById('contactComment').value.trim()
            };
            
            if (!contactData.name || !contactData.phone) {
                showToast('Nombre y número de WhatsApp son obligatorios', 'error');
                return;
            }
            
            if (contactId) {
                directory.updateContact(contactId, contactData);
                showToast('Contacto actualizado exitosamente', 'success');
            } else {
                directory.addContact(contactData);
                showToast('Contacto creado exitosamente', 'success');
            }
            
            closeModal('contactModal');
            renderContacts();
            renderGroups();
            renderStats();
        });

        document.getElementById('groupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const groupName = document.getElementById('groupName').value.trim();
            const groupColor = document.getElementById('groupColor').value;
            
            if (!groupName) {
                showToast('Por favor ingrese un nombre para el grupo', 'error');
                return;
            }
            
            directory.addGroup(groupName, groupColor);
            
            closeModal('groupModal');
            renderGroups();
            renderStats();
            showToast('Grupo creado exitosamente', 'success');
        });

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        // Keyboard shortcut to close modals
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        });

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        function init() {
            renderGroups();
            renderContacts();
            renderStats();
            console.log('Sistema de Directorio Profesional v' + CONFIG.version + ' iniciado');
            console.log('Zona horaria: America/Lima (UTC-5) - Perú');
            console.log('Historial inmutable activado');
            console.log('Soft delete habilitado');
            console.log('WhatsApp Business API integrado');
        }

        init();
    </script>
</body>
</html>
